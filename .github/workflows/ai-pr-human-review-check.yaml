jobs:
    enforce-human-approvals:
        runs-on: ubuntu-slim
        steps:
            - if: |-
                github.event_name == 'pull_request' &&
                !contains(fromJSON('["AIAgentsBitso","Claude","CursorAgent","dependabot[bot]"]'), github.event.pull_request.user.login)
              name: Fast-pass non-AI PRs
              uses: actions/github-script@v7
              with:
                script: |-
                    await github.rest.repos.createCommitStatus({
                      ...context.repo,
                      sha: context.payload.pull_request.head.sha,
                      state: 'success',
                      context: 'AI PR Human Review Policy',
                      description: 'Not an AI-authored PR — no policy required.',
                    });
            - if: |-
                (github.event_name == 'pull_request' || github.event_name == 'pull_request_review') &&
                contains(fromJSON('["AIAgentsBitso","Claude","CursorAgent","dependabot[bot]"]'), github.event.pull_request.user.login)
              name: Enforce human approval policy
              uses: bitsoex/actions/ai-pr-human-review-check@main
              with:
                required_human_approvals: "2"
name: AI PR Human Review Check
"on":
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
    pull_request_review:
        types:
            - submitted
            - edited
            - dismissed
permissions:
    contents: read
    pull-requests: read
    statuses: write
